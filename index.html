<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Flip Demo</title>
    <link rel="stylesheet" href="page-flip.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #a87420;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #a87420;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #555;
        }
        .description {
            text-align: center;
            margin-bottom: 20px;
        }
        #page-flip-container {
            margin: 20px auto;
        }
        .customization-note {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9f7fe;
            border-left: 4px solid #2196F3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="page-flip-container"></div>
    </div>

    <script src="page-flip.js"></script>
    <script>
        // Array of page images - replace with your own images
        // Place your images in an 'images' folder and update the paths below
        var pages = [
            'images/titlepage.jpg',  // Your title page
            'images/page2.jpg',      // Your page 2
            'images/page3.jpg',      // Your page 3
            'images/page4.jpg',      // Your page 4
            'images/page5.jpg',      // Your page 5
            'images/page6.jpg',      // Your page 6
            'images/page7.jpg',      // Your page 7
            'images/page8.jpg',      // Your page 8
            'images/page9.jpg',      // Your page 9
            'images/page10.jpg',     // Your page 10
            'images/page11.jpg',     // Your page 11
            'images/page12.jpg'      // Your page 12
        ];

        // Initialize the page flip
        var pageFlip = new Pageflip('#page-flip-container', pages);
    </script>
</body>
</html>
